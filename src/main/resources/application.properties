spring.application.name=ecommerce-springboot

# 1. Database Connection URL
# Replace 'db_name' with your actual schema name
spring.datasource.url=jdbc:mysql://localhost:3307/shoplify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# 2. Database Credentials
spring.datasource.username=root
spring.datasource.password=root

# 3. Hibernate / JPA Properties
# 'update' will automatically create/update tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=create

# Show the SQL queries in the console (great for debugging)
spring.jpa.show-sql=true

# Choose the MySQL dialect (helps Hibernate optimize queries)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect